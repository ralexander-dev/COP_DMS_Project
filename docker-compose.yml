services:
  # Containerized MySQL database with init script
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: dms_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # mount init.sql to create db and tables if not already created
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    # healthcheck to ensure MySQL is ready before backend tries to connect
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
  # Java Spring Boot backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
      # Persist Maven local repo so dependencies aren't re-downloaded on every restart
      - maven_cache:/root/.m2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/db/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
  # Next.js frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
      mysql:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      # Keep node_modules and .next inside the container — don't let the host mount override them
      - /app/node_modules
      - /app/.next
    environment:
      # Used by client components (fetch runs in the browser - must point at the host port)
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      # Used by server components (fetch runs inside this container - use the Docker service name)
      - API_URL=http://backend:8080
      # Enable filesystem polling so Next.js HMR works on macOS Docker volume mounts
      - WATCHPACK_POLLING=true
      - NEXT_TELEMETRY_DISABLED=1

volumes:
  maven_cache:
  mysql_data:
